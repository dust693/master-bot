<div class="tab-pane fade" id="tab-logs">
    <div class="card p-4 bg-white">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold m-0 text-dark">📋 Αρχείο Καταγραφής (Live Logs)</h5>
            <div class="d-flex align-items-center gap-3">
                <select class="form-select border-secondary fw-bold" onchange="sendAction('/set_log_level', {level: this.value})">
                    <option value="INFO">INFO (Βασικά)</option>
                    <option value="DEBUG" selected>DEBUG (Αναλυτικά)</option>
                    <option value="WARNING">WARNING (Προειδοποιήσεις)</option>
                    <option value="ERROR">ERROR (Μόνο Σφάλματα)</option>
                </select>
                <span id="logStatusBadge" class="badge bg-success">Auto-refresh Active</span>
            </div>
        </div>
        
        <div id="logViewer" style="height: 500px; overflow-y: auto; background-color: #1e1e1e; color: #00ff00; border: 1px solid #dee2e6; padding: 15px; font-family: monospace; font-size: 13px; white-space: pre-wrap;">Φόρτωση logs...</div>
    </div>
</div>
